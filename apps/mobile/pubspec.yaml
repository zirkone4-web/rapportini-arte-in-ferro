name: arte_in_ferro_rapportini
description: Piattaforma mobile aziendale Arte In Ferro Lascari.
publish_to: none
version: 0.7.1+9

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.3.0
  equatable: ^2.1.0
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_bloc: ^9.1.1
  flutter_image_compress: ^2.5.0
  geolocator: ^14.0.3
  image_picker: ^1.2.3
  intl: ^0.20.3
  path: ^1.9.1
  path_provider: ^2.1.6
  signature: ^6.3.0
  sqflite: ^2.4.2+1
  supabase_flutter: ^2.16.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo_arte_in_ferro.png
