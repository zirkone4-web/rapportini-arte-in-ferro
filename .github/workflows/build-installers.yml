name: Build APK e Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "tools/**"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: read

jobs:
  android:
    name: APK Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Genera piattaforme e permessi
        working-directory: .
        run: bash tools/bootstrap_mobile.sh
      - name: Analisi
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Crea APK release
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: rapportini-android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Software Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/windows/ArteInFerro.Rapportini.Desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Inserisce configurazione pubblica Supabase
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if ($env:SUPABASE_URL -and $env:SUPABASE_PUBLISHABLE_KEY) {
            $settings = Get-Content appsettings.json | ConvertFrom-Json
            $settings.SupabaseUrl = $env:SUPABASE_URL
            $settings.SupabasePublishableKey = $env:SUPABASE_PUBLISHABLE_KEY
            $settings | ConvertTo-Json | Set-Content appsettings.json
          }
      - name: Ripristina e compila
        run: dotnet restore
      - name: Pubblica win-x64 autonomo
        run: >-
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish
      - name: Crea pacchetto ZIP
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath Rapportini-Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: rapportini-windows-x64
          path: apps/windows/ArteInFerro.Rapportini.Desktop/Rapportini-Windows-x64.zip
          if-no-files-found: error
