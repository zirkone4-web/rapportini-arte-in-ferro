name: Build APK e Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "tools/**"
      - "supabase/**"
      - ".github/workflows/build-installers-corretto.yml"

concurrency:
  group: arte-in-ferro-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  iphone-web:
    name: App iPhone PWA
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/pwa
      - name: Pubblica PWA iPhone
        id: deployment
        uses: actions/deploy-pages@v4

  android:
    name: APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Genera piattaforme e permessi
        working-directory: .
        run: bash tools/bootstrap_mobile.sh
      - name: Configura firma Android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          python3 -c 'import base64, os, pathlib, string; raw=os.environ["KEYSTORE_BASE64"].strip(); is_hex=len(raw)%2==0 and all(c in string.hexdigits for c in raw); data=bytes.fromhex(raw) if is_hex else base64.b64decode(raw); pathlib.Path("android/app/arte-in-ferro-upload.jks").write_bytes(data)'
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=arte-in-ferro-upload.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
      - name: Analisi
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
      - name: Prepara configurazione release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          python3 -c 'import json, os, pathlib; keys=("SUPABASE_URL", "SUPABASE_PUBLISHABLE_KEY", "FIREBASE_PROJECT_ID", "FIREBASE_APP_ID", "FIREBASE_API_KEY", "FIREBASE_MESSAGING_SENDER_ID"); values={key: os.environ[key] for key in keys if os.environ.get(key)}; pathlib.Path("build-defines.json").write_text(json.dumps(values), encoding="utf-8")'
      - name: Crea APK release
        run: flutter build apk --release --dart-define-from-file=build-defines.json
      - name: Crea Android App Bundle Play Store
        run: flutter build appbundle --release --dart-define-from-file=build-defines.json
      - uses: actions/upload-artifact@v4
        with:
          name: rapportini-android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: arte-in-ferro-play-store-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Software Windows
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/windows/ArteInFerro.Rapportini.Desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Inserisce configurazione pubblica Supabase
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if ($env:SUPABASE_URL -and $env:SUPABASE_PUBLISHABLE_KEY) {
            $settings = Get-Content appsettings.json | ConvertFrom-Json
            $settings.SupabaseUrl = $env:SUPABASE_URL
            $settings.SupabasePublishableKey = $env:SUPABASE_PUBLISHABLE_KEY
            $settings | ConvertTo-Json | Set-Content appsettings.json
          }
      - name: Ripristina dipendenze
        run: dotnet restore
      - name: Pubblica win-x64 autonomo
        run: >-
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish
      - name: Crea pacchetto ZIP
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath Rapportini-Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: rapportini-windows-x64
          path: apps/windows/ArteInFerro.Rapportini.Desktop/Rapportini-Windows-x64.zip
          if-no-files-found: error
          retention-days: 14
